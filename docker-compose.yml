version: '3.8'

services:
  # Arknights RAG Backend + Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arknights-rag
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - DEEPSEEK_API_KEY_2=${DEEPSEEK_API_KEY_2}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./chunks:/app/chunks
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - arknights-network

  # Nginx reverse proxy (optional - for production HTTPS)
  # nginx:
  #   image: nginx:latest
  #   container_name: arknights-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./dist:/usr/share/nginx/html:ro
  #     - ./certbot/conf:/etc/letsencrypt:ro
  #     - ./certbot/www:/var/www/certbot:ro
  #   depends_on:
  #     - web
  #   networks:
  #     - arknights-network

networks:
  arknights-network:
    driver: bridge