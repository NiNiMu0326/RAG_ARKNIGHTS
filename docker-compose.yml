version: '3.8'

services:
  # Arknights RAG Backend + Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arknights-rag
    restart: unless-stopped
    ports:
      - "8889:8889"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./faiss_index:/app/faiss_index
      - ./chunks:/app/chunks
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8889/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - arknights-network

networks:
  arknights-network:
    driver: bridge
